name: Github Actions 실행하기

on:
  push:
    branches:
      - main

jobs:
  My-First-CICD-Job:
    runs-on: ubuntu-latest

    steps:
      - name: file-check
        run: |
          pwd
          ls -al
      - name: file-create
        run: |
          echo "This is the first cicd step" >> a.txt
          ls -al
          cat a.txt

  github-variables-check-job:
    runs-on: ubuntu-latest

    steps:
      - name: multiple-lines
        run: |
          echo "line 1"
          echo "line 2"
      - name: github-variables-check
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY

  secret-variables-check-job:
    runs-on: ubuntu-latest

    steps:
      - name: secret-variables-check
        run: |
          echo ${{ secrets.EC2_USER }}
          echo ${{ secrets.EC2_PEM_KEY }}
